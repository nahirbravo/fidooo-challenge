services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_USE_EMULATOR=true
      - NEXT_PUBLIC_EMULATOR_AUTH_HOST=firebase-emulator:9099
      - NEXT_PUBLIC_EMULATOR_FIRESTORE_HOST=firebase-emulator:8080
      - NEXT_PUBLIC_API_URL=http://api:4000/api/v1
      - FIREBASE_PROJECT_ID=demo-project
      - FIREBASE_AUTH_EMULATOR_HOST=firebase-emulator:9099
    depends_on:
      api:
        condition: service_healthy
      firebase-emulator:
        condition: service_started
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages:/app/packages

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=development
      - CORS_ORIGIN=http://localhost:3000
      - FIREBASE_PROJECT_ID=demo-project
      - FIREBASE_CLIENT_EMAIL=demo@demo-project.iam.gserviceaccount.com
      - FIREBASE_PRIVATE_KEY=dummy-key
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-mini
      - OPENAI_MAX_TOKENS=1024
      - API_VERSION=1.0.0
      - FIRESTORE_EMULATOR_HOST=firebase-emulator:8080
      - FIREBASE_AUTH_EMULATOR_HOST=firebase-emulator:9099
    depends_on:
      firebase-emulator:
        condition: service_started
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages

  firebase-emulator:
    image: andreysenov/firebase-tools:13.20.0
    ports:
      - "9099:9099"
      - "8080:8080"
      - "4001:4001"
    command: >
      firebase emulators:start
      --project demo-project
      --only auth,firestore
    volumes:
      - ./firebase:/home/node/firebase
    working_dir: /home/node/firebase
